global:
  scrape_interval: 15s

scrape_configs:
  - job_name: prometheus
    metrics_path: /metrics
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: gateway
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["api-gateway-service:8080"]

  - job_name: ingestion
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["log-ingestion-service:8090"]

  - job_name: detection
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["incident-detection-service:8091"]
