# Compose parity with docs/architecture/HLD.md for local/full-stack fidelity.
services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.2
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.6.2
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1

  kafka-init:
    image: confluentinc/cp-kafka:7.6.2
    depends_on:
      kafka:
        condition: service_started
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        set -euo pipefail
        echo "Waiting for Kafka..."
        cub kafka-ready -b kafka:9092 1 120
        kafka-topics --create --if-not-exists --bootstrap-server kafka:9092 --topic gateway-access-v1 --partitions 3 --replication-factor 1
        kafka-topics --create --if-not-exists --bootstrap-server kafka:9092 --topic telemetry-enriched-v1 --partitions 3 --replication-factor 1
        kafka-topics --create --if-not-exists --bootstrap-server kafka:9092 --topic incidents-v1 --partitions 3 --replication-factor 1
        echo "Kafka topics bootstrap complete."
    restart: on-failure

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: gatewayobs
      POSTGRES_USER: gatewayobs
      POSTGRES_PASSWORD: gatewayobs_local
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gatewayobs"]
      interval: 5s
      timeout: 5s
      retries: 15

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.3
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"

  jaeger:
    image: jaegertracing/all-in-one:1.65
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"

  tempo:
    image: grafana/tempo:2.6.2
    user: root
    command:
      - -target=all
      - -config.file=/etc/tempo.yaml
    ports:
      - "3200:3200"
    volumes:
      - ./tempo.yaml:/etc/tempo.yaml:ro
      - tempo_data:/tempo

  ollama:
    profiles:
      - ollama
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 30s
      retries: 60
      start_period: 15s

  ollama-init:
    profiles:
      - ollama
    image: ollama/ollama:latest
    environment:
      OLLAMA_HOST: http://ollama:11434
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: ["ollama pull llama3.2:1b"]
    restart: on-failure

  upstream-mock:
    image: hashicorp/http-echo:1.0.0
    command: ["-listen", ":8080", "-text", "upstream-ok"]

  prometheus:
    image: prom/prometheus:v3.3.2
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - api-gateway-service
      - log-ingestion-service
      - incident-detection-service

  grafana:
    image: grafana/grafana:11.5.8
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - tempo

  ai-analysis-service:
    build:
      context: ../../ai-analysis-service
    environment:
      INGESTION_BASE_URL: http://log-ingestion-service:8090
      ELASTICSEARCH_URL: http://elasticsearch:9200
      ELASTICSEARCH_INDEX: gateway-events-active
      # Groq free tier — set GROQ_API_KEY in .env (https://console.groq.com). Local Ollama: LLM_BACKEND=ollama && docker compose --profile ollama up
      LLM_BACKEND: ${LLM_BACKEND:-groq}
      GROQ_OPENAI_BASE_URL: ${GROQ_OPENAI_BASE_URL:-https://api.groq.com/openai/v1}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.1-8b-instant}
      OLLAMA_OPENAI_BASE_URL: http://ollama:11434/v1
      OLLAMA_MODEL: llama3.2:1b
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      # Python AI stacks into Tempo; Java services remain on Jaeger OTLP (:4318) for side-by-side comparison in Grafana.
      OTEL_SERVICE_NAME: ai-analysis-service
      OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4318
      OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: http://tempo:4318/v1/traces
    ports:
      - "8082:8082"
    depends_on:
      elasticsearch:
        condition: service_started
      log-ingestion-service:
        condition: service_started
      tempo:
        condition: service_started

  log-ingestion-service:
    build:
      context: ../..
      dockerfile: services/log-ingestion-service/Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/gatewayobs
      SPRING_DATASOURCE_USERNAME: gatewayobs
      SPRING_DATASOURCE_PASSWORD: gatewayobs_local
      SPRING_ELASTICSEARCH_URIS: http://elasticsearch:9200
      MANAGEMENT_OTLP_TRACING_EXPORT_ENABLED: "true"
      MANAGEMENT_OTLP_TRACING_ENDPOINT: http://jaeger:4318/v1/traces
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
      OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: http://jaeger:4318/v1/traces
    ports:
      - "8090:8090"
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_started
      jaeger:
        condition: service_started

  incident-detection-service:
    build:
      context: ../..
      dockerfile: services/incident-detection-service/Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/gatewayobs
      SPRING_DATASOURCE_USERNAME: gatewayobs
      SPRING_DATASOURCE_PASSWORD: gatewayobs_local
      MANAGEMENT_OTLP_TRACING_EXPORT_ENABLED: "true"
      MANAGEMENT_OTLP_TRACING_ENDPOINT: http://jaeger:4318/v1/traces
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
      OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: http://jaeger:4318/v1/traces
    ports:
      - "8091:8091"
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      log-ingestion-service:
        condition: service_started
      jaeger:
        condition: service_started

  api-gateway-service:
    build:
      context: ../..
      dockerfile: services/api-gateway-service/Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      REDIS_HOST: redis
      UPSTREAM_MOCK_HOST: upstream-mock
      UPSTREAM_MOCK_PORT: 8080
      LOG_INGESTION_HOST: log-ingestion-service
      LOG_INGESTION_PORT: 8090
      AI_SERVICE_HOST: ai-analysis-service
      AI_SERVICE_PORT: 8082
      GATEWAY_CHAOS_ALLOW_HEADER: "true"
      GATEWAY_RL_REPLENISH: "600"
      GATEWAY_RL_BURST: "900"
      MANAGEMENT_OTLP_TRACING_EXPORT_ENABLED: "true"
      MANAGEMENT_OTLP_TRACING_ENDPOINT: http://jaeger:4318/v1/traces
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
      OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: http://jaeger:4318/v1/traces
    ports:
      - "8080:8080"
    depends_on:
      redis:
        condition: service_started
      upstream-mock:
        condition: service_started
      kafka-init:
        condition: service_completed_successfully
      jaeger:
        condition: service_started

  dashboard-web:
    build:
      context: ../../dashboard-web
    ports:
      - "4173:80"
    depends_on:
      api-gateway-service:
        condition: service_started

networks:
  default:
    name: gatewayobs

volumes:
  ollama_data:
  tempo_data:
